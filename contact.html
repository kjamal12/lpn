  <title>Contact - LaunchPoint Network</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <!-- JS -->
  <script src="js/script.js" defer></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="main-nav">

  <div class="nav-container">

    <a href="index.html" class="nav-logo">
      <img src="images/logo2.png" alt="LaunchPoint Logo">
    </a>

     <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>

      <li><a href="donate.html">Donate</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>

    <a href="volunteer.html" class="nav-cta">Join the Network</a>

  </div>

</nav>

<!-- ========================
     CONTACT HERO
========================= -->
<section class="contact-hero">
  <h1>Contact Us</h1>
  <p>Reach out — we’d love to hear from you</p>
</section>


<!-- ========================
     CONTACT MAIN (2 COLUMN)
========================= -->
<section class="contact-section">

  <div class="contact-container">

    <!-- LEFT SIDE -->
    <div class="contact-info">

      <h2>Get in Touch</h2>

      <p class="contact-sub">
        Whether you're a student, partner, or supporter — we’d love to connect.
      </p>

      <div class="contact-details">
        <p><i class="fas fa-envelope"></i> info@launchpointnet.ca</p>
        <p><strong>Location:</strong> Toronto, Ontario</p>
      </div>

    </div>

    <!-- RIGHT SIDE FORM -->
    <div class="contact-form-box">

      <form onsubmit="sendEmail(this)">

        <div class="form-row">
          <input type="text" name="first" placeholder="First Name" required>
          <input type="text" name="last" placeholder="Last Name" required>
        </div>

        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="subject" placeholder="Subject" required>

        <textarea name="message" placeholder="Message" required></textarea>

        <button type="submit">Send Message</button>

      </form>

    </div>

  </div>

</section>

<!-- ✅ FOOTER -->
<div id="footer"></div>

<script>
fetch("footer.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
